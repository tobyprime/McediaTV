name: mcedia_mtv_plugin
version: '1.0-SNAPSHOT'
main: top.tobyprime.mcedia_mtv_plugin.Mcedia_mtv_plugin
api-version: '1.21'
folia-supported: true
permissions:
  mcedia.mtv.admin:
    description: 所有 MTV 管理权限
    default: op
    children:
      mcedia.mtv.create: true
      mcedia.mtv.delete: true
      mcedia.mtv.edit: true
      mcedia.mtv.teleport: true
      mcedia.mtv.movehere: true
      mcedia.mtv.gui: true
      mcedia.mtv.list: true
  mcedia.mtv.create:
    description: 创建 MTV 播放器
    default: op
  mcedia.mtv.delete:
    description: 删除 MTV 播放器
    default: op
  mcedia.mtv.edit:
    description: 编辑 MTV 设置（屏幕/扬声器/播放/移动）
    default: true
  mcedia.mtv.teleport:
    description: 传送到 MTV 播放器
    default: op
  mcedia.mtv.movehere:
    description: 将 MTV 播放器传送到自己位置
    default: true
  mcedia.mtv.gui:
    description: 打开 MTV 管理 GUI
    default: true
  mcedia.mtv.list:
    description: 列出附近的 MTV 播放器
    default: true
