# Build workflow for McediaTV
#
# Builds the Fabric mod and Paper plugin across supported Minecraft versions.
# McediaCore artifacts (api, player, decoder, core, cn-platforms) are obtained
# by mcedia-core-deps — downloads from McediaCore's GitHub Release.
# Paper plugin (mcedia-mtv-plugin) builds independently.
# An all-in-one variant (mcedia-mtv-allinone) bundles mcedia-core (Windows
# native) + mcedia-cn-platforms into a single jar.
#
# Job structure:
#   discover → mcedia-core-deps (matrix: mc_version) → mcedia-mtv (matrix: mc_version)
#   discover → mcedia-mtv-plugin (matrix: server_version)
#   discover → mcedia-core-deps → mcedia-mtv-allinone (matrix: mc_version)
#                                                        ↓
#                                                     release
name: Build

on:
  push:
    branches: [master, dev]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      mc_versions:
        description: 'Minecraft versions (comma-separated, e.g. 1.21.11 or 1.21.11,26.1)'
        default: '1.21.11'
        required: true
        type: string
      create_release:
        description: 'Create a GitHub Release with the built artifacts'
        default: false
        type: boolean

env:
  GRADLE_OPTS: '-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8'

jobs:
  # ── Discover ────────────────────────────────────────────────────────
  # Normalizes MC versions from gradle.properties or workflow_dispatch
  # input into a JSON array consumed by downstream matrix jobs.
  discover:
    runs-on: ubuntu-latest
    outputs:
      mc_versions: ${{ steps.set-mc.outputs.mc_versions }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Minecraft versions
        id: set-mc
        run: |
          if [ '${{ github.event_name }}' = 'workflow_dispatch' ]; then
            INPUT='${{ github.event.inputs.mc_versions }}'
          else
            INPUT=$(grep '^supported_mc_versions' gradle.properties | cut -d= -f2-)
          fi
          JSON=$(echo "$INPUT" | tr ',' '\n' \
            | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' \
            | jq --raw-input --slurp --compact-output \
              'split("\n") | map(select(length > 0))')
          echo "mc_versions=$JSON" >> "$GITHUB_OUTPUT"
          echo "Resolved MC versions: $JSON"

  # ── McediaCore dependencies ─────────────────────────────────────────
  # Downloads McediaCore artifacts (api, player, decoder, core, cn-platforms)
  # from the latest GitHub Release. No source build.
  #
  # Produces two artifacts per MC version:
  #   mcedia-core-publish-*   — Maven repo layout (publish/) for dep resolution
  #   mcedia-core-build-libs-* — raw jars (build-libs/) for all-in-one bundling
  mcedia-core-deps:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      matrix:
        mc_version: ${{ fromJSON(needs.discover.outputs.mc_versions) }}
    steps:
      - uses: actions/checkout@v4

      - name: Download McediaCore Release artifacts
        # curl directly (not gh CLI): GH_TOKEN is scoped to McediaTV and
        # can't access tobyprime/Mcedia's releases.  Public repo so
        # unauthenticated API access is fine (60 req/hr limit).
        run: |
          mkdir -p release-jars
          TAG="v1.0.1"
          echo "Fetching release $TAG from tobyprime/Mcedia ..."
          API_JSON=$(curl -sL "https://api.github.com/repos/tobyprime/Mcedia/releases/tags/$TAG")
          if echo "$API_JSON" | jq -e '.assets | length == 0' > /dev/null 2>&1; then
            echo "ERROR: no assets found — API response:" >&2
            echo "$API_JSON" | head -5 >&2
            exit 1
          fi
          # Use name + browser_download_url pairs: API 'name' has real
          # '+' while the download URL has '%2B' (valid in URLs).
          echo "$API_JSON" | jq -r '.assets[] | "\(.name)\t\(.browser_download_url)"' | \
          while IFS=$'\t' read -r name url; do
            echo "  -> $name"
            curl -sL "$url" -o "release-jars/$name"
          done
          count=$(ls release-jars/*.jar 2>/dev/null | wc -l)
          echo "Downloaded $count jars from McediaCore $TAG"
          ls -la release-jars/

      - name: Setup Maven publish/ directory
        run: |
          setup_artifact() {
            local g=$1 a=$2 v=$3 j=$4
            local d="publish/${g//.//}/$a/$v"
            mkdir -p "$d"
            cp "$j" "$d/$a-$v.jar"
            printf '%s\n' \
              '<?xml version="1.0" encoding="UTF-8"?>' \
              '<project xmlns="http://maven.apache.org/POM/4.0.0"' \
              '         xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"' \
              '         xsi:schemaLocation="http://maven.apache.org/POM/4.0.0 http://maven.apache.org/xsd/maven-4.0.0.xsd">' \
              '  <modelVersion>4.0.0</modelVersion>' \
              "  <groupId>$g</groupId>" \
              "  <artifactId>$a</artifactId>" \
              "  <version>$v</version>" \
              '</project>' > "$d/$a-$v.pom"
          }
          MCV=${{ matrix.mc_version }}
          for jar in release-jars/*.jar; do
            name=$(basename "$jar" .jar)
            case "$name" in
              mcedia-api-*)
                setup_artifact top.tobyprime mcedia-api "${name#mcedia-api-}" "$jar" ;;
              mcedia-player-*)
                setup_artifact top.tobyprime mcedia-player "${name#mcedia-player-}" "$jar" ;;
              mcedia-decoder-ffmpeg-*)
                setup_artifact top.tobyprime mcedia-decoder-ffmpeg "${name#mcedia-decoder-ffmpeg-}" "$jar" ;;
              mcedia_core-*)
                rest="${name#mcedia_core-}"; v="${rest%%+*}"
                # Only publish windows-x86_64 variant (for all-in-one include bundling)
                echo "$name" | grep -q windows-x86_64 || continue
                mc=$(echo "${rest#*+}" | sed 's/\.[a-zA-Z].*//')
                [ "$mc" != "$MCV" ] && continue
                aid="mcedia_core-mc$mc"
                [ -f "publish/top.tobyprime/$aid/$v/$aid-$v.jar" ] || \
                  setup_artifact top.tobyprime "$aid" "$v" "$jar"
                ;;
              mcedia_cn_platforms-*)
                rest="${name#mcedia_cn_platforms-}"; v="${rest%%+*}"
                mc=$(echo "${rest#*+}" | sed 's/\.[a-zA-Z].*//')
                [ "$mc" != "$MCV" ] && continue
                aid="mcedia_cn_platforms-mc$mc"
                [ -f "publish/top.tobyprime/$aid/$v/$aid-$v.jar" ] || \
                  setup_artifact top.tobyprime "$aid" "$v" "$jar"
                ;;
            esac
          done

      - name: Upload publish directory
        uses: actions/upload-artifact@v4
        with:
          name: mcedia-core-publish-${{ matrix.mc_version }}
          path: publish/

  # ── Fabric mod: mcedia-mtv ──────────────────────────────────────────
  # Entity-synced media player mod. One build per MC version.
  # Depends on McediaCore published artifacts (from mcedia-core-publish job).
  # Tests are skipped: they depend on Minecraft's rendering infrastructure
  # (GL context, OpenAL) not available on CI runners.
  mcedia-mtv:
    needs: [discover, mcedia-core-deps]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mc_version: ${{ fromJSON(needs.discover.outputs.mc_versions) }}
    steps:
      - uses: actions/checkout@v4

      - name: Download McediaCore publish directory
        uses: actions/download-artifact@v4
        with:
          name: mcedia-core-publish-${{ matrix.mc_version }}
          path: ../McediaCore/publish

      - name: Resolve Java version for ${{ matrix.mc_version }}
        id: jdk
        run: |
          PROP="mcedia-mtv/versions/${{ matrix.mc_version }}/gradle.properties"
          echo "java_version=$(grep '^java_version' "$PROP" | cut -d= -f2)" >> "$GITHUB_OUTPUT"

      - name: Set up JDK ${{ steps.jdk.outputs.java_version }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ steps.jdk.outputs.java_version }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Verify publish directory
        run: |
          echo "=== Published mcedia_core artifacts ==="
          find ../McediaCore/publish -name '*.jar' | sort | head -10
          echo "=== (count: $(find ../McediaCore/publish -name '*.jar' | wc -l)) ==="

      - name: Build mcedia-mtv for ${{ matrix.mc_version }}
        run: |
          ./gradlew :mcedia-mtv-${{ matrix.mc_version }}:buildAndCollect \
                    -Psupported_mc_versions=${{ matrix.mc_version }} \
                    -x test

      - name: Upload mcedia-mtv JAR (${{ matrix.mc_version }})
        uses: actions/upload-artifact@v4
        with:
          name: mcedia-mtv-${{ matrix.mc_version }}
          path: build/libs/${{ matrix.mc_version }}/*.jar
          if-no-files-found: error

  # ── Paper plugin: mcedia-mtv-plugin ─────────────────────────────────
  # Channel management Paper plugin. Builds for each supported Paper
  # server version. No McediaCore dependency.
  mcedia-mtv-plugin:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      matrix:
        server_version: ${{ fromJSON(needs.discover.outputs.mc_versions) }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Java version for Paper ${{ matrix.server_version }}
        id: jdk
        run: |
          if [ '${{ matrix.server_version }}' = '26.1' ]; then
            echo "java_version=25" >> "$GITHUB_OUTPUT"
          else
            echo "java_version=21" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK ${{ steps.jdk.outputs.java_version }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ steps.jdk.outputs.java_version }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build plugin for Paper ${{ matrix.server_version }}
        # --configure-on-demand avoids configuring Fabric projects (which
        # require McediaCore's publish directory) when only building the plugin.
        run: |
          ./gradlew :mcedia-mtv-plugin:build \
                    -PserverVersion=${{ matrix.server_version }} \
                    --configure-on-demand

      - name: Upload plugin JAR (${{ matrix.server_version }})
        uses: actions/upload-artifact@v4
        with:
          name: mcedia-mtv-plugin-${{ matrix.server_version }}
          path: mcedia-mtv-plugin/build/libs/*.jar
          if-no-files-found: error

  # ── Fabric mod: mcedia-mtv all-in-one ────────────────────────────────
  # Builds mcedia-mtv with mcedia-core (Windows native) bundled via
  # Fabric Loom's include mechanism. The core is resolved from the
  # publish directory (already filtered to windows-x86_64 by mcedia-core-deps).
  # The output jar has "-allinone" in the filename automatically.
  mcedia-mtv-allinone:
    needs: [discover, mcedia-core-deps]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mc_version: ${{ fromJSON(needs.discover.outputs.mc_versions) }}
    steps:
      - uses: actions/checkout@v4

      - name: Download McediaCore publish directory
        uses: actions/download-artifact@v4
        with:
          name: mcedia-core-publish-${{ matrix.mc_version }}
          path: ../McediaCore/publish

      - name: Resolve Java version for ${{ matrix.mc_version }}
        id: jdk
        run: |
          echo "java_version=$(grep '^java_version' "mcedia-mtv/versions/${{ matrix.mc_version }}/gradle.properties" | cut -d= -f2)" >> "$GITHUB_OUTPUT"

      - name: Set up JDK ${{ steps.jdk.outputs.java_version }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ steps.jdk.outputs.java_version }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build all-in-one for ${{ matrix.mc_version }}
        # Uses Loom's include to bundle core into the mod jar
        run: |
          ./gradlew :mcedia-mtv-${{ matrix.mc_version }}:buildAndCollect \
                    -Psupported_mc_versions=${{ matrix.mc_version }} \
                    -PallInOne=true \
                    -x test

      - name: Upload all-in-one JAR (${{ matrix.mc_version }})
        uses: actions/upload-artifact@v4
        with:
          name: mcedia-mtv-allinone-${{ matrix.mc_version }}
          path: build/libs/${{ matrix.mc_version }}/mcedia-mtv-allinone-*.jar
          if-no-files-found: error

  # ── Release ──────────────────────────────────────────────────────────
  # Creates a GitHub Release with all built JARs as assets (normal + all-in-one).
  # Triggered by:
  #   - Push of a tag matching v* (e.g. v0.4.0, v1.0.0-rc1)
  #   - workflow_dispatch with create_release=true
  release:
    if: |
      startsWith(github.ref, 'refs/tags/v')
      || (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')
    needs: [mcedia-mtv, mcedia-mtv-plugin, mcedia-mtv-allinone]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download final build artifacts (skip intermediate core-deps)
        uses: actions/download-artifact@v4
        with:
          pattern: mcedia-mtv-*
          path: artifacts

      - name: Gather JAR files
        run: |
          mkdir -p release-assets
          find artifacts -name '*.jar' -type f | while read jar; do
            echo "Collected: $jar"
            cp "$jar" release-assets/
          done
          echo "---"
          ls -lh release-assets/

      - name: Determine release tag and name
        id: tag
        run: |
          if [ '${{ github.event_name }}' = 'workflow_dispatch' ]; then
            VERSION=$(grep '^version=' gradle.properties | cut -d= -f2)
            echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
            echo "name=v${VERSION} (manual release)"
          else
            TAG=${GITHUB_REF_NAME}
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
            echo "name=${TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.name }}
          body: |
            Automated build from commit ${{ github.sha }}.

            ## Modules

            - **mcedia-mtv** — Fabric mod for entity-synced media playback
            - **mcedia-mtv-plugin** — Paper plugin for channel management

            ## Supported Minecraft Versions

            ${{ needs.discover.outputs.mc_versions }}
          files: release-assets/*.jar
          fail_on_unmatched_files: true

      # ── Publish to Modrinth ───────────────────────────────────────────
      - name: Publish to Modrinth
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          MODRINTH_FABRIC_PROJECT_ID: ${{ secrets.MODRINTH_FABRIC_PROJECT_ID }}
          MODRINTH_PLUGIN_PROJECT_ID: ${{ secrets.MODRINTH_PLUGIN_PROJECT_ID }}
          MCEDIA_CORE_PROJECT_ID: ${{ secrets.MCEDIA_CORE_PROJECT_ID }}
        run: |
          set -euo pipefail

          publish_version() {
            local jar="$1"
            local project_id="$2"
            local mcver="$3"
            local version_number="$4"
            local display_name="$5"
            local loaders_json="$6"
            local deps_json="$7"

            # Read game_versions from minecraft_version in gradle.properties
            local prop_file="mcedia-mtv/versions/${mcver}/gradle.properties"
            local game_version="$mcver"
            if [ -f "$prop_file" ]; then
              local mv
              mv=$(grep '^minecraft_version' "$prop_file" | cut -d= -f2 | tr -d ' ')
              [ -n "$mv" ] && game_version="$mv"
            fi

            # Build compact JSON metadata, write to temp file
            local tmp
            tmp=$(mktemp)
            jq -c -n \
              --arg name "$display_name" \
              --arg version_number "$version_number" \
              --argjson game_versions "[ \"$game_version\" ]" \
              --arg version_type "release" \
              --argjson loaders "$loaders_json" \
              --argjson dependencies "$deps_json" \
              --arg project_id "$project_id" \
              --arg changelog "Automated build from commit ${GITHUB_SHA:0:7}." \
              '{
                name: $name,
                version_number: $version_number,
                changelog: $changelog,
                game_versions: $game_versions,
                version_type: $version_type,
                loaders: $loaders,
                dependencies: $dependencies,
                project_id: $project_id,
                featured: false,
                file_parts: ["file"],
                primary_file: "file"
              }' > "$tmp"

            echo "  → ${display_name} (${mcver}, loader=$loaders_json)"
            response=$(curl -sL -w "\n%{http_code}" -X POST "https://api.modrinth.com/v2/version" \
              -H "Authorization: $MODRINTH_TOKEN" \
              -F "data=@${tmp}" \
              -F "file=@${jar}")
            rm -f "$tmp"
            http_code=$(echo "$response" | tail -1)
            body=$(echo "$response" | head -n -1)

            if [ "$http_code" = "200" ]; then
              echo "  ✓ Success"
            else
              echo "  ✗ Failed (HTTP $http_code): $(echo "$body" | head -c 300)"
            fi
          }

          # === Fabric mod (mcedia-mtv) ===
          if [ -n "${MODRINTH_TOKEN:-}" ] && [ -n "${MODRINTH_FABRIC_PROJECT_ID:-}" ]; then
            echo "::group::Publish Fabric mod to Modrinth"
            for jar in release-assets/mcedia-mtv-*.jar; do
              [ -f "$jar" ] || continue
              filename=$(basename "$jar")
              # Skip plugin and sources JARs
              [[ "$filename" == mcedia-mtv-plugin-* ]] && continue
              [[ "$filename" == *-sources-* ]] && continue

              # Determine variant
              case "$filename" in
                mcedia-mtv-allinone-*)
                  is_allinone=true
                  rest="${filename#mcedia-mtv-allinone-}"
                  prefix="mcedia-mtv-allinone"
                  ;;
                *)
                  is_allinone=false
                  rest="${filename#mcedia-mtv-}"
                  prefix="mcedia-mtv"
                  ;;
              esac

              # Parse: <modver>+<mcver>+build<ts>.jar
              modver="${rest%%+*}"
              mcver="${rest#*+}"
              mcver="${mcver%%+*}"
              version_number="${modver}+${mcver}"
              display_name="${prefix} ${modver}+${mcver}"

              # Build dependencies
              deps="[]"
              if [ -n "${MCEDIA_CORE_PROJECT_ID:-}" ]; then
                if [ "$is_allinone" = true ]; then
                  deps="[{\"project_id\":\"${MCEDIA_CORE_PROJECT_ID}\",\"dependency_type\":\"embedded\"}]"
                else
                  deps="[{\"project_id\":\"${MCEDIA_CORE_PROJECT_ID}\",\"dependency_type\":\"required\"}]"
                fi
              fi

              publish_version \
                "$jar" \
                "$MODRINTH_FABRIC_PROJECT_ID" \
                "$mcver" \
                "$version_number" \
                "$display_name" \
                '["fabric"]' \
                "$deps" || true
            done
            echo "::endgroup::"
          else
            echo "::notice::Skip Modrinth Fabric publish: MODRINTH_TOKEN or MODRINTH_FABRIC_PROJECT_ID not set"
          fi

          # === Paper plugin (mcedia-mtv-plugin) ===
          if [ -n "${MODRINTH_TOKEN:-}" ] && [ -n "${MODRINTH_PLUGIN_PROJECT_ID:-}" ]; then
            echo "::group::Publish Paper plugin to Modrinth"
            for dir in artifacts/mcedia-mtv-plugin-*; do
              [ -d "$dir" ] || continue
              dirname=$(basename "$dir")
              mcver="${dirname#mcedia-mtv-plugin-}"

              for jar in "$dir"/*.jar; do
                [ -f "$jar" ] || continue
                filename=$(basename "$jar")
                [[ "$filename" == *-sources-* ]] && continue

                modver="${filename#mcedia-mtv-plugin-}"
                modver="${modver%.jar}"
                version_number="${modver}+${mcver}"
                display_name="mcedia-mtv-plugin ${modver}+${mcver}"

                publish_version \
                  "$jar" \
                  "$MODRINTH_PLUGIN_PROJECT_ID" \
                  "$mcver" \
                  "$version_number" \
                  "$display_name" \
                  '["paper","folia"]' \
                  '[]' || true
              done
            done
            echo "::endgroup::"
          else
            echo "::notice::Skip Modrinth Plugin publish: MODRINTH_PLUGIN_PROJECT_ID not set"
          fi
